name: CI/CD Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: torpeda808/devops-platform-app
  PYTHON_VERSION: "3.12"

jobs:
  # =====================================================
  # JOB 1: TESTS - run unit tests
  # =====================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tasks_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/tasks_db
        run: |
          pytest tests/ -v --tb=short

  # =====================================================
  # JOB 2: BUILD AND PUSH DOCKER IMAGE
  # =====================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG="v1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =====================================================
  # JOB 3: SECURITY SCAN with Trivy
  # =====================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # =====================================================
  # JOB 4: UPDATE GITOPS REPO with new image tag
  # =====================================================
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: dxczek/devops-platform-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment
        run: |
          cd gitops
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|image: torpeda808/devops-platform-app:.*|image: torpeda808/devops-platform-app:${NEW_TAG}|g" base/app/app-deployment.yaml
          echo "Updated to tag: ${NEW_TAG}"
          cat base/app/app-deployment.yaml | grep image:

      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add base/app/app-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update task-api image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
